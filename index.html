<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймер для митингов</title>
    <style>
        :root {
            --btn-size: clamp(45px, 12vw, 60px);
            --btn-gap: clamp(5px, 2vw, 10px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #222830;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 5px;
            margin: 0;
            transition: background 0.3s ease;
        }

        body.overtime-critical {
            background: #3D2020;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(15px, 3vw, 25px);
            width: 100%;
            padding: 0;
            margin: 0;
        }

        .timer-wrapper {
            position: relative;
            width: min(100%, calc(60px * 4 + var(--btn-gap) * 3));
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        
        .circle-container svg {
            width: 100%;
            height: 100%;
        }

        .circle-bg {
            fill: none;
            stroke: #3D444D;
            stroke-width: 32;
            transition: fill 0.3s ease;
        }

        .circle-container.overtime-bg .circle-bg {
            fill: #2B2027;
        }

        .circle-progress {
            fill: none;
            stroke: #347D39;
            stroke-width: 32;
            stroke-linecap: round;
            transition: stroke 0.3s ease, stroke-dashoffset 0.1s linear;
            stroke-dasharray: 848;
            stroke-dashoffset: 848;
        }

        .circle-progress.warning {
            stroke: #ff8c42;
        }

        .circle-progress.overtime {
            stroke: #C93B37;
        }

        .timer-display {
            position: relative;
            font-size: clamp(23.4px, 8.1vw, 49.5px);
            font-weight: 300;
            color: #ffffff;
            text-align: center;
            font-variant-numeric: tabular-nums;
            z-index: 10;
            opacity: 1;
        }

        button {
            background: transparent;
            border: 2px solid #3D444D;
            border-radius: 50px;
            padding: clamp(12px, 2vw, 15px) clamp(30px, 5vw, 40px);
            font-size: clamp(12.6px, 1.8vw, 16.2px);
            font-weight: 500;
            color: #3D444D;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: clamp(96px, 16vw, 120px);
        }

        button:hover {
            background: #3D444D;
            color: #ffffff;
        }

        button:active {
            transform: scale(0.98);
        }

        button.active {
            background: transparent;
            color: #ffffff;
        }

        .icon-btn {
            min-width: auto;
            width: 60px;
            height: 60px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn svg {
            width: 28px;
            height: 28px;
        }

        .time-btn {
            min-width: auto;
            width: 60px;
            height: 60px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 3.375vw, 24.75px);
            flex-shrink: 0;
        }

        .time-buttons {
            display: flex;
            flex-direction: row;
            gap: var(--btn-gap);
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: calc(60px * 5 + var(--btn-gap) * 4);
        }

        @media (max-width: 500px) {
            .time-buttons {
                flex-direction: column;
                align-items: center;
                max-width: 60px;
            }
        }

        @media (min-width: 501px) {
            .time-buttons {
                flex-wrap: wrap;
            }
        }

        .session-timer-wrapper {
            position: relative;
            width: min(50%, calc((60px * 4 + var(--btn-gap) * 3) * 0.5));
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .session-circle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .session-circle-container svg {
            width: 100%;
            height: 100%;
        }

        .session-circle-bg {
            fill: none;
            stroke: #3D444D;
            stroke-width: 32;
        }

        .session-circle-progress {
            fill: none;
            stroke: #ffffff;
            stroke-width: 32;
            stroke-linecap: round;
            stroke-dasharray: 848;
            stroke-dashoffset: 848;
            transition: stroke-dashoffset 0.1s linear;
        }

        .session-timer-display {
            position: relative;
            font-size: clamp(11.7px, 4.05vw, 24.75px);
            font-weight: 300;
            color: #ffffff;
            text-align: center;
            font-variant-numeric: tabular-nums;
            z-index: 10;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="session-timer-wrapper">
            <svg class="session-circle-container" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet">
                <circle class="session-circle-bg" cx="150" cy="150" r="135"></circle>
                <circle class="session-circle-progress" id="sessionCircleProgress" cx="150" cy="150" r="135"></circle>
            </svg>
            <div class="session-timer-display" id="sessionTimerDisplay">00:00</div>
        </div>

        <div class="timer-wrapper">
            <svg class="circle-container" id="circleContainer" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet">
                <circle class="circle-bg" cx="150" cy="150" r="135"></circle>
                <circle class="circle-progress" id="circleProgress" cx="150" cy="150" r="135"></circle>
            </svg>
            <div class="timer-display" id="timerDisplay">02:00</div>
        </div>

        <div class="time-buttons">
            <button class="time-btn" data-minutes="2">2</button>
            <button class="time-btn" data-minutes="3">3</button>
            <button class="time-btn" data-minutes="5">5</button>
            <button class="time-btn" data-minutes="10">10</button>
            <button id="stopBtn" class="icon-btn" aria-label="Stop">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="6" width="12" height="12"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Сессионный таймер (запускается при загрузке)
        const sessionStartTime = Date.now();
        const sessionCircleProgress = document.getElementById('sessionCircleProgress');
        const sessionTimerDisplay = document.getElementById('sessionTimerDisplay');
function updateSessionTimer() {
            const elapsed = (Date.now() - sessionStartTime) / 1000;
            const totalMins = Math.floor(elapsed / 60);
            const secs = Math.floor(elapsed % 60);
            const hours = Math.floor(totalMins / 60);
            const mins = totalMins % 60;

            if (hours > 0) {
                sessionTimerDisplay.textContent = `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
            } else {
                sessionTimerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }

            const GREEN_PHASE  = 45 * 60; // 0–45 мин
            const ORANGE_PHASE = 15 * 60; // 45–60 мин
            const RED_CYCLE    = 15 * 60; // 60+ мин, циклы по 15 мин

            let cycleProgress, color;

            if (elapsed < GREEN_PHASE) {
                cycleProgress = elapsed / GREEN_PHASE;
                color = '#347D39';
            } else if (elapsed < GREEN_PHASE + ORANGE_PHASE) {
                cycleProgress = (elapsed - GREEN_PHASE) / ORANGE_PHASE;
                color = '#ff8c42';
            } else {
                cycleProgress = ((elapsed - GREEN_PHASE - ORANGE_PHASE) % RED_CYCLE) / RED_CYCLE;
                color = '#C93B37';
            }

            sessionCircleProgress.style.stroke = color;
            sessionCircleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE * (1 - cycleProgress);
        }

        setInterval(updateSessionTimer, 50);

        let targetTime = null;
        let timerInterval = null;
        let isRunning = false;
        let isPaused = false;
        let pausedTimeRemaining = 0;
        let currentDuration = 120; // По умолчанию 2 минуты
        let lastSetDuration = 120; // Последний установленный интервал
        let isOvertime = false;

        const timerDisplay = document.getElementById('timerDisplay');
        const circleProgress = document.getElementById('circleProgress');
        const circleContainer = document.getElementById('circleContainer');
        const stopBtn = document.getElementById('stopBtn');
        const timeButtons = document.querySelectorAll('.time-btn');
        
        const CIRCLE_CIRCUMFERENCE = 848; // 2 * PI * radius (135)

        function formatTime(seconds) {
            const absSeconds = Math.abs(seconds);
            const mins = Math.floor(absSeconds / 60);
            const secs = Math.floor(absSeconds % 60);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimer() {
            if (!targetTime) return;

            const now = Date.now();
            const elapsed = (now - (targetTime - currentDuration * 1000)) / 1000;
            const totalSeconds = currentDuration;
            
            let displaySeconds, progress;

            if (elapsed <= totalSeconds) {
                // Основное время - зеленый/оранжевый
                displaySeconds = totalSeconds - elapsed;
                progress = elapsed / totalSeconds;
                const offset = CIRCLE_CIRCUMFERENCE * (1 - progress);
                circleProgress.style.strokeDashoffset = offset;
                circleProgress.classList.remove('overtime');
                
                // Проверяем, осталось ли меньше 25% времени
                if (progress >= 0.75) {
                    // Меньше 25% времени - оранжевый
                    circleProgress.classList.add('warning');
                } else {
                    // Больше 25% времени - зеленый
                    circleProgress.classList.remove('warning');
                }
                
                // Убираем эффекты овертайма
                circleContainer.classList.remove('overtime-bg');
                document.body.classList.remove('overtime-critical');
                isOvertime = false;
            } else {
                const overtimeElapsed = elapsed - totalSeconds;
                circleProgress.classList.remove('warning');
                circleProgress.classList.add('overtime');
                isOvertime = true;

                // Прямой счёт вперёд начиная с основного времени: 2:00, 2:01, 2:02...
                displaySeconds = totalSeconds + overtimeElapsed;

                // Круг делает один оборот за totalSeconds секунд, потом остаётся полным
                const overtimeCycleProgress = Math.min(overtimeElapsed / totalSeconds, 1);
                circleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE * (1 - overtimeCycleProgress);

                if (overtimeElapsed >= totalSeconds * 0.5) {
                    circleContainer.classList.add('overtime-bg');
                } else {
                    circleContainer.classList.remove('overtime-bg');
                }

                if (overtimeElapsed >= totalSeconds * 0.6) {
                    document.body.classList.add('overtime-critical');
                } else {
                    document.body.classList.remove('overtime-critical');
                }
            }

            timerDisplay.textContent = formatTime(displaySeconds);
        }

        function startTimer(seconds = currentDuration) {
            stopTimer();
            currentDuration = seconds;
            lastSetDuration = seconds; // Сохраняем последний установленный интервал
            targetTime = Date.now() + (seconds * 1000);
            isRunning = true;
            isPaused = false;
            isOvertime = false;
            circleProgress.classList.remove('overtime', 'warning');
            circleContainer.classList.remove('overtime-bg');
            document.body.classList.remove('overtime-critical');
            circleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE;
            updateStopButton();
            updateTimer();
            timerInterval = setInterval(updateTimer, 50);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isRunning = false;
            isPaused = false;
            isOvertime = false;
            circleProgress.classList.remove('overtime', 'warning');
            circleContainer.classList.remove('overtime-bg');
            document.body.classList.remove('overtime-critical');
            updateStopButton();
        }

        function pauseTimer() {
            if (!isRunning || isPaused) return;
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            // Сохраняем оставшееся время
            const now = Date.now();
            const elapsed = (now - (targetTime - currentDuration * 1000)) / 1000;
            pausedTimeRemaining = elapsed;
            
            isPaused = true;
            isRunning = false;
            updateStopButton();
        }

        function resumeTimer() {
            if (!isPaused) return;
            
            // Продолжаем с сохраненного времени
            targetTime = Date.now() + (currentDuration * 1000 - pausedTimeRemaining * 1000);
            isPaused = false;
            isRunning = true;
            updateStopButton();
            updateTimer();
            timerInterval = setInterval(updateTimer, 50);
        }

        function togglePause() {
            if (isPaused) {
                resumeTimer();
            } else if (isRunning) {
                pauseTimer();
            }
        }

        function updateStopButton() {
            if (isPaused) {
                // Показываем иконку Play
                stopBtn.innerHTML = `
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
                        <polygon points="6,4 18,12 6,20"/>
                    </svg>
                `;
            } else {
                // Показываем иконку Stop
                stopBtn.innerHTML = `
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="6" width="12" height="12"/>
                    </svg>
                `;
            }
        }

        // Обработчики событий
        stopBtn.addEventListener('click', togglePause);

        timeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Убираем active у всех кнопок времени
                timeButtons.forEach(b => b.classList.remove('active'));
                // Добавляем active к текущей кнопке
                btn.classList.add('active');
                
                let seconds;
                if (btn.dataset.seconds) {
                    seconds = parseInt(btn.dataset.seconds);
                } else {
                    seconds = parseInt(btn.dataset.minutes) * 60;
                }
                startTimer(seconds);
            });
        });

        // Клавиатурные shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '2') {
                startTimer(120); // 2 минуты
            } else if (e.key === '3') {
                startTimer(180); // 3 минуты
            } else if (e.key === '5') {
                startTimer(300); // 5 минут
            } else if (e.key === ' ' || e.key === 'Escape') {
                e.preventDefault();
                startTimer(lastSetDuration);
            }
        });

        // Инициализация при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            currentDuration = 120;
            timerDisplay.textContent = '02:00';
            circleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE;
        });
    </script>
</body>
</html>
