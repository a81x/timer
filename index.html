<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймер для митингов</title>
    <style>
        :root {
            --btn-size: clamp(45px, 12vw, 60px);
            --btn-gap: clamp(5px, 2vw, 10px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #222830;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 5px;
            margin: 0;
            transition: background 0.3s ease;
        }

        body.overtime-critical {
            background: #3D2020;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(15px, 3vw, 25px);
            width: 100%;
            padding: 0;
            margin: 0;
        }

        .timer-wrapper {
            position: relative;
            width: min(80%, calc((60px * 4 + var(--btn-gap) * 3) * 0.8));
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        
        .circle-container svg {
            width: 100%;
            height: 100%;
        }

        .circle-bg {
            fill: none;
            stroke: #3D444D;
            stroke-width: 32;
            transition: fill 0.3s ease;
        }

        .circle-container.overtime-bg .circle-bg {
            fill: #2B2027;
        }

        .circle-progress {
            fill: none;
            stroke: #347D39;
            stroke-width: 32;
            stroke-linecap: round;
            transition: stroke 0.3s ease, stroke-dashoffset 0.1s linear;
            stroke-dasharray: 848;
            stroke-dashoffset: 848;
        }

        .circle-progress.warning {
            stroke: #ff8c42;
        }

        .circle-progress.overtime {
            stroke: #C93B37;
        }

        .timer-display {
            position: relative;
            font-size: clamp(18.7px, 6.48vw, 39.6px);
            font-weight: 300;
            color: #ffffff;
            text-align: center;
            font-variant-numeric: tabular-nums;
            z-index: 10;
            opacity: 1;
        }

        button {
            background: transparent;
            border: 2px solid #3D444D;
            border-radius: 50px;
            padding: clamp(12px, 2vw, 15px) clamp(30px, 5vw, 40px);
            font-size: clamp(12.6px, 1.8vw, 16.2px);
            font-weight: 500;
            color: #3D444D;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: clamp(96px, 16vw, 120px);
        }

        button:hover {
            background: #3D444D;
            color: #ffffff;
        }

        button:active {
            transform: scale(0.98);
        }

        button.active {
            background: transparent;
            color: #ffffff;
        }

        .icon-btn {
            min-width: auto;
            width: 51px;
            height: 51px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
        }

        .time-btn {
            min-width: auto;
            width: 51px;
            height: 51px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(15.3px, 2.87vw, 21px);
            flex-shrink: 0;
        }

        .time-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--btn-gap);
            align-items: center;
            width: 100%;
            max-width: 51px;
        }

        .session-timer-wrapper {
            position: relative;
            width: min(calc(45% * var(--session-scale, 1)), calc((60px * 4 + var(--btn-gap) * 3) * 0.45 * var(--session-scale, 1)));
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: width 0.6s ease;
        }

        .session-circle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .session-circle-container svg {
            width: 100%;
            height: 100%;
        }

        .session-circle-bg {
            fill: none;
            stroke: #3D444D;
            stroke-width: 32;
        }

        .session-circle-progress {
            fill: none;
            stroke: #ffffff;
            stroke-width: 32;
            stroke-linecap: round;
            stroke-dasharray: 848;
            stroke-dashoffset: 848;
            transition: stroke-dashoffset 0.1s linear;
        }

        .session-timer-display {
            position: relative;
            font-size: calc(clamp(10.5px, 3.65vw, 22.3px) * var(--session-scale, 1));
            font-weight: 300;
            color: #ffffff;
            text-align: center;
            font-variant-numeric: tabular-nums;
            z-index: 10;
            transition: font-size 0.6s ease;
        }

        /* Привлечение внимания в овертайме: короткое исчезновение и появление */
        @keyframes attention-blink {
            0%   { opacity: 1; }
            30%  { opacity: 0; }
            70%  { opacity: 0; }
            100% { opacity: 1; }
        }

        .attention-blink {
            animation: attention-blink 1s ease-in-out;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="timer-wrapper" id="timerWrapper">
            <svg class="circle-container" id="circleContainer" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet">
                <circle class="circle-bg" cx="150" cy="150" r="135"></circle>
                <circle class="circle-progress" id="circleProgress" cx="150" cy="150" r="135"></circle>
            </svg>
            <div class="timer-display" id="timerDisplay">02:00</div>
        </div>

        <div class="time-buttons">
            <button class="time-btn" data-minutes="2">2</button>
            <button id="stopBtn" class="icon-btn" aria-label="Stop">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="6" width="12" height="12"/>
                </svg>
            </button>
        </div>

        <div class="session-timer-wrapper" id="sessionTimerWrapper">
            <svg class="session-circle-container" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet">
                <circle class="session-circle-bg" cx="150" cy="150" r="135"></circle>
                <circle class="session-circle-progress" id="sessionCircleProgress" cx="150" cy="150" r="135"></circle>
            </svg>
            <div class="session-timer-display" id="sessionTimerDisplay">15:00</div>
        </div>
    </div>

    <script>
        // Сессионный таймер (прямой счёт, запускается при первом старте основного таймера)
        const sessionCircleProgress = document.getElementById('sessionCircleProgress');
        const sessionTimerDisplay = document.getElementById('sessionTimerDisplay');
        const sessionTimerWrapper = document.getElementById('sessionTimerWrapper');
        let lastSessionBlinkMinute = 0;
        let sessionStarted = false;

        // Короткое мигание элемента для привлечения внимания (раз в минуту овертайма)
        function triggerBlink(el) {
            el.classList.add('attention-blink');
            el.addEventListener('animationend', function handler() {
                el.classList.remove('attention-blink');
            }, { once: true });
        }
        let sessionPaused = false;
        let sessionStartTime = null;   // момент последнего запуска/возобновления
        let sessionElapsedBase = 0;    // секунд накоплено до последней паузы
        let sessionInterval = null;

        function getSessionElapsed() {
            return sessionElapsedBase + (sessionStartTime ? (Date.now() - sessionStartTime) / 1000 : 0);
        }

        const SESSION_DURATION = 15 * 60;        // обратный отсчёт 15 минут
        const SESSION_GROWTH_INTERVAL = 5 * 60;  // шаг роста: каждые 5 минут овертайма
        const SESSION_BASE_FRACTION = 0.45;      // базовый размер (как в CSS)
        const SESSION_TOP_FRACTION = 0.80;       // размер верхнего таймера
        const SESSION_MAX_SCALE = SESSION_TOP_FRACTION / SESSION_BASE_FRACTION;

        function setSessionScale(scale) {
            const s = Math.min(scale, SESSION_MAX_SCALE);
            document.documentElement.style.setProperty('--session-scale', s);
        }

        function formatSessionTime(seconds) {
            const total = Math.floor(seconds);
            const hours = Math.floor(total / 3600);
            const mins = Math.floor((total % 3600) / 60);
            const secs = total % 60;
            if (hours > 0) {
                return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateSessionTimer() {
            const elapsed = getSessionElapsed();
            const remaining = SESSION_DURATION - elapsed;

            if (remaining > 0) {
                // Фаза обратного отсчёта: 15:00 → 00:00, круг убывает
                sessionTimerDisplay.textContent = formatSessionTime(remaining);
                const progress = remaining / SESSION_DURATION; // 1 → 0
                sessionCircleProgress.style.stroke = '#347D39';
                sessionCircleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE * (1 - progress);
                setSessionScale(1);
            } else {
                // Овертайм: прямой счёт вперёд от 15:00 (15:01, 15:02...), размер растёт ступенями
                const overtimeElapsed = -remaining;
                sessionTimerDisplay.textContent = formatSessionTime(elapsed);

                // +10% при достижении нуля, далее +10% каждые 5 минут (потолок — размер верхнего)
                const steps = 1 + Math.floor(overtimeElapsed / SESSION_GROWTH_INTERVAL);
                setSessionScale(Math.pow(1.1, steps));

                sessionCircleProgress.style.stroke = '#C93B37';
                const cycleProgress = (overtimeElapsed % SESSION_GROWTH_INTERVAL) / SESSION_GROWTH_INTERVAL;
                sessionCircleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE * (1 - cycleProgress);

                // Привлечение внимания: мигаем раз в минуту овертайма
                const overtimeMinute = Math.floor(overtimeElapsed / 60);
                if (overtimeMinute > lastSessionBlinkMinute) {
                    lastSessionBlinkMinute = overtimeMinute;
                    triggerBlink(sessionTimerWrapper);
                }
            }
        }

        function startSessionTimer() {
            if (sessionStarted) return;
            sessionStarted = true;
            sessionStartTime = Date.now();
            updateSessionTimer();
            sessionInterval = setInterval(updateSessionTimer, 50);
        }

        function pauseSessionTimer() {
            if (!sessionStarted || sessionPaused) return;
            sessionElapsedBase = getSessionElapsed();
            sessionStartTime = null;
            sessionPaused = true;
            clearInterval(sessionInterval);
            sessionInterval = null;
        }

        function resumeSessionTimer() {
            if (!sessionStarted || !sessionPaused) return;
            sessionStartTime = Date.now();
            sessionPaused = false;
            sessionInterval = setInterval(updateSessionTimer, 50);
        }

        let targetTime = null;
        let timerInterval = null;
        let isRunning = false;
        let isPaused = false;
        let pausedTimeRemaining = 0;
        let currentDuration = 120; // По умолчанию 2 минуты
        let lastSetDuration = 120; // Последний установленный интервал
        let isOvertime = false;
        let lastBlinkMinute = 0;   // последняя минута овертайма, на которой мигали

        const timerDisplay = document.getElementById('timerDisplay');
        const timerWrapper = document.getElementById('timerWrapper');
        const circleProgress = document.getElementById('circleProgress');
        const circleContainer = document.getElementById('circleContainer');
        const stopBtn = document.getElementById('stopBtn');
        const timeButtons = document.querySelectorAll('.time-btn');
        
        const CIRCLE_CIRCUMFERENCE = 848; // 2 * PI * radius (135)

        function formatTime(seconds) {
            const absSeconds = Math.abs(seconds);
            const mins = Math.floor(absSeconds / 60);
            const secs = Math.floor(absSeconds % 60);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimer() {
            if (!targetTime) return;

            const now = Date.now();
            const elapsed = (now - (targetTime - currentDuration * 1000)) / 1000;
            const totalSeconds = currentDuration;
            
            let displaySeconds, progress;

            if (elapsed <= totalSeconds) {
                // Основное время - зеленый/оранжевый
                displaySeconds = totalSeconds - elapsed;
                progress = elapsed / totalSeconds;
                const offset = CIRCLE_CIRCUMFERENCE * (1 - progress);
                circleProgress.style.strokeDashoffset = offset;
                circleProgress.classList.remove('overtime');
                
                // Проверяем, осталось ли меньше 25% времени
                if (progress >= 0.75) {
                    // Меньше 25% времени - оранжевый
                    circleProgress.classList.add('warning');
                } else {
                    // Больше 25% времени - зеленый
                    circleProgress.classList.remove('warning');
                }
                
                // Убираем эффекты овертайма
                circleContainer.classList.remove('overtime-bg');
                document.body.classList.remove('overtime-critical');
                isOvertime = false;
            } else {
                const overtimeElapsed = elapsed - totalSeconds;
                circleProgress.classList.remove('warning');
                circleProgress.classList.add('overtime');
                isOvertime = true;

                // Прямой счёт вперёд начиная с основного времени: 2:00, 2:01, 2:02...
                displaySeconds = totalSeconds + overtimeElapsed;

                // Круг делает один оборот за totalSeconds секунд, потом остаётся полным
                const overtimeCycleProgress = Math.min(overtimeElapsed / totalSeconds, 1);
                circleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE * (1 - overtimeCycleProgress);

                if (overtimeElapsed >= totalSeconds * 0.5) {
                    circleContainer.classList.add('overtime-bg');
                } else {
                    circleContainer.classList.remove('overtime-bg');
                }

                if (overtimeElapsed >= totalSeconds * 0.6) {
                    document.body.classList.add('overtime-critical');
                } else {
                    document.body.classList.remove('overtime-critical');
                }

                // Привлечение внимания: мигаем раз в минуту овертайма
                const overtimeMinute = Math.floor(overtimeElapsed / 60);
                if (overtimeMinute > lastBlinkMinute) {
                    lastBlinkMinute = overtimeMinute;
                    triggerBlink(timerWrapper);
                }
            }

            timerDisplay.textContent = formatTime(displaySeconds);
        }

        function startTimer(seconds = currentDuration) {
            stopTimer();
            currentDuration = seconds;
            lastSetDuration = seconds; // Сохраняем последний установленный интервал
            targetTime = Date.now() + (seconds * 1000);
            isRunning = true;
            isPaused = false;
            isOvertime = false;
            lastBlinkMinute = 0;
            circleProgress.classList.remove('overtime', 'warning');
            circleContainer.classList.remove('overtime-bg');
            document.body.classList.remove('overtime-critical');
            circleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE;
            updateStopButton();
            updateTimer();
            timerInterval = setInterval(updateTimer, 50);

            // Сессионный таймер: запускается при первом старте, возобновляется после паузы
            if (!sessionStarted) {
                startSessionTimer();
            } else if (sessionPaused) {
                resumeSessionTimer();
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isRunning = false;
            isPaused = false;
            isOvertime = false;
            circleProgress.classList.remove('overtime', 'warning');
            circleContainer.classList.remove('overtime-bg');
            document.body.classList.remove('overtime-critical');
            updateStopButton();
        }

        function pauseTimer() {
            if (!isRunning || isPaused) return;
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            // Сохраняем оставшееся время
            const now = Date.now();
            const elapsed = (now - (targetTime - currentDuration * 1000)) / 1000;
            pausedTimeRemaining = elapsed;

            isPaused = true;
            isRunning = false;
            pauseSessionTimer();
            updateStopButton();
        }

        function resumeTimer() {
            if (!isPaused) return;
            
            // Продолжаем с сохраненного времени
            targetTime = Date.now() + (currentDuration * 1000 - pausedTimeRemaining * 1000);
            isPaused = false;
            isRunning = true;
            resumeSessionTimer();
            updateStopButton();
            updateTimer();
            timerInterval = setInterval(updateTimer, 50);
        }

        function togglePause() {
            if (isPaused) {
                resumeTimer();
            } else if (isRunning) {
                pauseTimer();
            }
        }

        function updateStopButton() {
            if (isPaused) {
                // Показываем иконку Play
                stopBtn.innerHTML = `
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
                        <polygon points="6,4 18,12 6,20"/>
                    </svg>
                `;
            } else {
                // Показываем иконку Stop
                stopBtn.innerHTML = `
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="6" width="12" height="12"/>
                    </svg>
                `;
            }
        }

        // Обработчики событий
        stopBtn.addEventListener('click', togglePause);

        timeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Убираем active у всех кнопок времени
                timeButtons.forEach(b => b.classList.remove('active'));
                // Добавляем active к текущей кнопке
                btn.classList.add('active');
                
                let seconds;
                if (btn.dataset.seconds) {
                    seconds = parseInt(btn.dataset.seconds);
                } else {
                    seconds = parseInt(btn.dataset.minutes) * 60;
                }
                startTimer(seconds);
            });
        });

        // Клавиатурные shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '2') {
                startTimer(120); // 2 минуты
            } else if (e.key === ' ' || e.key === 'Escape') {
                e.preventDefault();
                startTimer(lastSetDuration);
            }
        });

        // Инициализация при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            currentDuration = 120;
            timerDisplay.textContent = '02:00';
            circleProgress.style.strokeDashoffset = CIRCLE_CIRCUMFERENCE;

            // Сессионный таймер: полный зелёный круг и значение 15:00 до старта
            sessionTimerDisplay.textContent = formatSessionTime(SESSION_DURATION);
            sessionCircleProgress.style.stroke = '#347D39';
            sessionCircleProgress.style.strokeDashoffset = 0;
        });
    </script>
</body>
</html>
